<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV SEARCH PRO | Ultimate Discovery</title>
    
    <!-- Modern Typography: Inter & Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #020617;
            --surface: #0f172a;
            --surface-hover: #1e293b;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --accent: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-xl: 20px;
            --radius-pill: 100px;
        }

        [data-bs-theme="light"] {
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --surface-hover: #f1f5f9;
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.1);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.06);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: var(--transition);
            margin: 0; padding: 0;
        }

        /* Glass Header */
        .app-header {
            position: sticky;
            top: 0; z-index: 1050;
            background: rgba(var(--bg-rgb), 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0;
        }
        [data-bs-theme="dark"] { --bg-rgb: 2, 6, 23; }
        [data-bs-theme="light"] { --bg-rgb: 248, 250, 252; }

        .container-xl { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

        .brand {
            font-weight: 800; font-size: 1.5rem; letter-spacing: -0.04em;
            color: var(--text-main); text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }
        .brand-icon {
            width: 36px; height: 36px; background: var(--primary);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: white; box-shadow: 0 4px 12px var(--primary-glow);
        }

        /* Hero Search Area */
        .hero-area {
            padding: 4rem 0 2rem;
            text-align: center;
            background: radial-gradient(circle at 50% 0%, var(--primary-glow) 0%, transparent 70%);
        }
        .hero-title {
            font-size: 2.8rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 2rem;
            background: linear-gradient(to bottom, var(--text-main), var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-container {
            max-width: 800px; margin: 0 auto;
            background: var(--surface); border: 1px solid var(--border);
            padding: 8px; border-radius: 20px;
            display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: var(--transition);
        }
        .search-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15), 0 0 0 4px var(--primary-glow);
            transform: translateY(-2px);
        }
        .search-input {
            flex: 1; background: transparent; border: none; outline: none;
            padding: 10px 20px; font-size: 1.1rem; color: var(--text-main);
            font-weight: 500;
        }
        .search-btn {
            background: var(--primary); color: white; border: none;
            padding: 12px 32px; border-radius: 14px; font-weight: 700;
            transition: var(--transition);
        }
        .search-btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* Filter Controls */
        .controls-area {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
            margin-top: 2rem; padding: 0 20px;
        }
        .pill-group {
            background: var(--surface); border: 1px solid var(--border);
            padding: 6px; border-radius: var(--radius-pill);
            display: flex; gap: 4px;
        }
        .pill-item {
            padding: 8px 20px; border-radius: var(--radius-pill); border: none;
            background: transparent; color: var(--text-muted); font-size: 0.85rem;
            font-weight: 600; transition: var(--transition); cursor: pointer;
        }
        .pill-item.active {
            background: var(--primary); color: white !important;
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .pill-item:hover:not(.active) { color: var(--text-main); background: var(--surface-hover); }

        /* HOT Button - FORCED VISIBILITY */
        .btn-hot {
            background: #ef4444 !important;
            color: #ffffff !important;
            border: none !important;
            padding: 12px 24px !important;
            border-radius: var(--radius-pill) !important;
            font-weight: 700 !important;
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4) !important;
            transition: var(--transition) !important;
        }
        .btn-hot:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.5); }
        .btn-hot span, .btn-hot i { color: #ffffff !important; }

        /* Toggle Buttons */
        .toggle-btn {
            padding: 12px 24px; border-radius: var(--radius-pill);
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 8px;
        }
        .toggle-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); }

        /* Grid & Cards */
        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px; padding: 4rem 0;
        }
        .movie-card {
            background: var(--surface); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border); transition: var(--transition);
            display: flex; flex-direction: column; height: 100%;
        }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        .poster-box { position: relative; aspect-ratio: 2/3; overflow: hidden; background: #000; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .movie-card:hover .poster-img { transform: scale(1.08); }
        
        .source-tag {
            position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); color: white; padding: 4px 10px; border-radius: 6px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        }

        .card-body { padding: 1.25rem; display: flex; flex-direction: column; flex: 1; }
        .movie-title { font-size: 1rem; font-weight: 700; line-height: 1.4; margin-bottom: 0.75rem; 
                      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .movie-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; }
        .movie-code { color: var(--primary); font-weight: 800; font-family: monospace; }

        .stat-group { display: flex; gap: 12px; font-size: 0.75rem; color: var(--text-muted); margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
        .stat-item { display: flex; align-items: center; gap: 4px; }

        .btn-dl { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 12px; width: 100%; font-weight: 700; font-size: 0.85rem; margin-top: 1rem; }
        .btn-copy { background: var(--surface-hover); border: 1px solid var(--border); color: var(--text-main); width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }

        /* Skeleton */
        .skeleton { background: var(--surface); height: 450px; border-radius: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 0.3; } 100% { opacity: 0.6; } }

        /* Theme/Lang Btns */
        .util-btn { width: 42px; height: 42px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); font-weight: 700; font-size: 0.8rem; }
        .util-btn:hover { border-color: var(--primary); color: var(--text-main); }

        .pagination { margin: 4rem 0; display: flex; justify-content: center; align-items: center; gap: 2rem; }
        .page-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-main); padding: 10px 24px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .page-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--primary); color: white; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #history { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 1.5rem; }
        .history-item { padding: 4px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; }

        /* Toast */
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="container-xl d-flex justify-content-between align-items-center">
            <a href="#" class="brand" onclick="location.reload()">
                <div class="brand-icon"><i class="fas fa-search"></i></div>
                <span>AV SEARCH <span style="font-weight: 300; opacity: 0.6;">PRO</span></span>
            </a>
            <div class="d-flex gap-2">
                <div class="util-btn" onclick="toggleLang()" id="langBtn">EN</div>
                <div class="util-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></div>
            </div>
        </div>
    </header>

    <section class="hero-area">
        <div class="container-xl">
            <h1 class="hero-title" data-t="title">极致影音资源搜索终端</h1>
            
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" data-t-placeholder="ph" placeholder="输入番号、关键词..." onkeypress="if(event.keyCode==13) doSearch(1)">
                <button class="search-btn" onclick="doSearch(1)" data-t="btn_search">搜索</button>
            </div>

            <div class="controls-area">
                <div class="pill-group">
                    <button class="pill-item type-tab active" data-val="all" data-t="t_all">全部</button>
                    <button class="pill-item type-tab" data-val="censored" data-t="t_c">有码</button>
                    <button class="pill-item type-tab" data-val="uncensored" data-t="t_u">无码</button>
                </div>
                <div class="pill-group">
                    <button class="pill-item sort-tab active" data-val="default" data-t="s_d">智能排序</button>
                    <button class="pill-item sort-tab" data-val="seeders" data-t="s_h">热度</button>
                    <button class="pill-item sort-tab" data-val="downloads" data-t="s_dl">下载量</button>
                    <button class="pill-item sort-tab" data-val="date" data-t="s_n">最新</button>
                </div>
                <button class="toggle-btn" id="cnSubBtn">
                    <i class="fas fa-closed-captioning"></i> <span data-t="sub">中文字幕</span>
                </button>
                <button class="btn-hot" onclick="doSearch(1, '')">
                    <i class="fas fa-fire"></i> <span data-t="hot">探索热门</span>
                </button>
            </div>

            <div id="history"></div>
        </div>
    </section>

    <main class="container-xl">
        <div class="d-flex justify-content-between align-items-center pt-5">
            <div class="fw-bold" style="letter-spacing: 0.05em; font-size: 0.9rem;">
                <span id="statusIcon"><i class="fas fa-check-circle text-success me-2"></i></span>
                <span id="statusText" data-t="st_ready">系统就绪</span>
            </div>
        </div>

        <div id="grid" class="results-grid"></div>

        <div class="pagination" id="pager" style="display: none;">
            <button class="page-btn" id="prev" onclick="movePage(-1)" data-t="prev">上一页</button>
            <span id="pageNum" class="fw-bold text-primary">PAGE 1</span>
            <button class="page-btn" id="next" onclick="movePage(1)" data-t="next">下一页</button>
        </div>
    </main>

    <div id="toast" class="toast-msg"></div>

    <script>
        const i18n = {
            zh: {
                title: "极致影音资源搜索终端", ph: "输入番号、关键词...", btn_search: "立即搜索",
                t_all: "全部", t_c: "有码", t_u: "无码", s_d: "智能排序", s_h: "做种热度", s_dl: "累计下载", s_n: "最新发布",
                sub: "中文字幕", hot: "探索热门", st_ready: "聚合引擎就绪", st_loading: "正在跨站检索...",
                st_found: "找到 {n} 条结果", st_empty: "未发现相关资源", dl: "唤起下载", prev: "上一页", next: "下一页",
                copied: "磁力链接已复制", clear: "清空历史",
                seeds: "做种人数", leechers: "正在下载", downloads: "完成量"
            },
            en: {
                title: "Ultimate Movie Aggregator", ph: "Enter ID or Keywords...", btn_search: "Search",
                t_all: "All", t_c: "Censored", t_u: "Uncensored", s_d: "Smart Sort", s_h: "Seeders", s_dl: "Completed", s_n: "Newest",
                sub: "CN Sub", hot: "Discover", st_ready: "Engine Ready", st_loading: "Searching across sources...",
                st_found: "{n} results found", st_empty: "No results matched", dl: "Download", prev: "Prev", next: "Next",
                copied: "Magnet Copied", clear: "Clear",
                seeds: "Seeds", leechers: "Leechers", downloads: "Done"
            }
        };

        let lang = localStorage.getItem('lang') || 'zh';
        let theme = localStorage.getItem('theme') || 'dark';
        let type = 'all', sort = 'default', cn = false, page = 1, lastQ = '';

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme();
            applyLang();
            loadHistory();
            doSearch(1, '');

            document.querySelectorAll('.type-tab').forEach(b => b.onclick = () => {
                document.querySelectorAll('.type-tab').forEach(x => x.classList.remove('active'));
                b.classList.add('active'); type = b.dataset.val; doSearch(1);
            });
            document.querySelectorAll('.sort-tab').forEach(b => b.onclick = () => {
                document.querySelectorAll('.sort-tab').forEach(x => x.classList.remove('active'));
                b.classList.add('active'); sort = b.dataset.val; doSearch(1);
            });
            document.getElementById('cnSubBtn').onclick = function() {
                cn = !cn; this.classList.toggle('active', cn); doSearch(1);
            };
        });

        function applyTheme() {
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.getElementById('themeBtn').innerHTML = theme === 'dark' ? '<i class="fas fa-sun" style="color:#fbbf24"></i>' : '<i class="fas fa-moon"></i>';
        }
        function toggleTheme() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', theme); applyTheme(); }
        function applyLang() {
            const t = i18n[lang];
            document.querySelectorAll('[data-t]').forEach(el => el.innerText = t[el.dataset.t] || el.innerText);
            document.querySelectorAll('[data-t-placeholder]').forEach(el => el.placeholder = t[el.dataset.tPlaceholder]);
            document.getElementById('langBtn').innerText = lang === 'zh' ? 'EN' : 'CN';
            document.getElementById('pageNum').innerText = `PAGE ${page}`;
        }
        function toggleLang() { lang = lang === 'zh' ? 'en' : 'zh'; localStorage.setItem('lang', lang); applyLang(); doSearch(page, lastQ); }

        async function doSearch(p, q) {
            const query = (q !== undefined) ? q : document.getElementById('searchInput').value.trim().toUpperCase();
            lastQ = query; page = p;
            if(q !== undefined) document.getElementById('searchInput').value = q;
            if(query) saveHistory(query);

            const grid = document.getElementById('grid');
            const statusText = document.getElementById('statusText');
            const statusIcon = document.getElementById('statusIcon');
            const t = i18n[lang];

            grid.innerHTML = Array(10).fill('<div class="skeleton"></div>').join('');
            statusText.innerText = t.st_loading;
            statusIcon.innerHTML = '<i class="fas fa-circle-notch fa-spin text-primary me-2"></i>';

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}&sort=${sort}&type=${type}&chinese=${cn}&page=${page}`);
                const data = await res.json();
                
                if(!data.length) {
                    grid.innerHTML = `<div class="col-12 text-center py-5 opacity-50"><h4>${t.st_empty}</h4></div>`;
                    statusText.innerText = t.st_empty;
                    statusIcon.innerHTML = '<i class="fas fa-exclamation-triangle text-warning me-2"></i>';
                    document.getElementById('pager').style.display = 'none';
                    return;
                }

                statusText.innerText = t.st_found.replace('{n}', data.length);
                statusIcon.innerHTML = '<i class="fas fa-check-circle text-success me-2"></i>';
                document.getElementById('pager').style.display = 'flex';
                document.getElementById('prev').disabled = page === 1;
                document.getElementById('pageNum').innerText = `PAGE ${page}`;
                
                render(data);
            } catch(e) {
                grid.innerHTML = '<div class="col-12 alert alert-danger">Fetch Error</div>';
            }
        }

        function render(data) {
            const t = i18n[lang];
            document.getElementById('grid').innerHTML = data.map(item => {
                const code = item.code || 'Unknown';
                const placeholder = `https://via.placeholder.com/300x450?text=${encodeURIComponent(code)}`;
                
                // Use thumb if available, fallback to cover
                let img = item.thumb || item.cover || '';
                
                // Enhanced image proxy logic (Borrowed from Download Team)
                let proxiedImg = img;
                if (img && img.startsWith('http')) {
                    // Use our local backend proxy which handles Referers correctly
                    proxiedImg = `/api/proxy_image?url=${encodeURIComponent(img)}`;
                } else {
                    proxiedImg = placeholder;
                }
                
                return `
                <div class="movie-card">
                    <div class="poster-box">
                        <img src="${proxiedImg}" 
                             class="poster-img" 
                             loading="lazy" 
                             referrerpolicy="no-referrer" 
                             data-original="${img}"
                             data-cover="${item.cover || img}"
                             data-code="${code}"
                             onerror="handleImgError(this)">
                        <span class="source-tag">${item.source}</span>
                    </div>
                    <div class="card-body">
                        <div class="movie-title" title="${item.title}">${item.title}</div>
                        <div class="movie-meta">
                            <span class="movie-code">${item.code}</span>
                            <span>${item.date}</span>
                        </div>
                        <div class="stat-group">
                            <div class="stat-item"><i class="fas fa-hdd text-primary"></i> ${item.size}</div>
                            ${item.seeders ? `<div class="stat-item" title="${t.seeds}"><i class="fas fa-arrow-up text-success"></i> ${item.seeders}</div>` : ''}
                            ${item.leechers ? `<div class="stat-item" title="${t.leechers}"><i class="fas fa-arrow-down text-warning"></i> ${item.leechers}</div>` : ''}
                            ${item.downloads ? `<div class="stat-item" title="${t.downloads}"><i class="fas fa-check-circle text-info"></i> ${item.downloads}</div>` : ''}
                        </div>
                        <div class="d-flex gap-2 align-items-center">
                            <button class="btn-dl" onclick="location.href='${item.magnet}'"><i class="fas fa-download me-2"></i>${t.dl}</button>
                            <button class="btn-copy" onclick="copyMag('${item.magnet}')"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function copyMag(m) {
            navigator.clipboard.writeText(m).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = i18n[lang].copied; toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        function handleImgError(el) {
            const original = el.getAttribute('data-original');
            const code = el.getAttribute('data-code') || 'Unknown';
            const currentSrc = el.src;
            
            console.warn(`Image load failed for ${code}:`, currentSrc);

            if (currentSrc.includes('/api/proxy_image')) {
                // Local proxy failed, try public proxy (weserv.nl)
                console.log(`[${code}] Local proxy failed, trying images.weserv.nl...`);
                el.src = `https://images.weserv.nl/?url=${encodeURIComponent(original)}&w=300&h=450&fit=cover&output=webp`;
            } else if (currentSrc.includes('weserv.nl')) {
                // Primary proxy failed, try secondary proxy (wsrv.nl)
                console.log(`[${code}] Trying secondary proxy (wsrv.nl)...`);
                el.src = `https://wsrv.nl/?url=${encodeURIComponent(original)}&w=300&h=450&fit=cover&output=webp`;
            } else if (currentSrc.includes('wsrv.nl')) {
                // Secondary proxy failed, try Jetpack proxy
                console.log(`[${code}] Trying Jetpack proxy...`);
                const cleanUrl = original.replace(/^https?:\/\//, '');
                el.src = `https://i0.wp.com/${cleanUrl}?w=300&h=450&strip=all`;
            } else if (!currentSrc.includes('placeholder') && currentSrc !== original) {
                // Proxies failed, try direct access with no-referrer
                console.log(`[${code}] Trying direct access...`);
                el.src = original;
            } else {
                // Everything failed
                console.error(`[${code}] All image sources failed.`);
                el.src = `https://via.placeholder.com/300x450?text=${encodeURIComponent(code)}+Not+Found`;
                el.onerror = null; // Prevent infinite recursion
            }
        }
        function movePage(d) { page += d; doSearch(page, lastQ); window.scrollTo({top:0, behavior:'smooth'}); }
        function saveHistory(q) {
            let h = JSON.parse(localStorage.getItem('h') || '[]');
            h = [q, ...h.filter(i => i !== q)].slice(0, 10);
            localStorage.setItem('h', JSON.stringify(h)); loadHistory();
        }
        function loadHistory() {
            const h = JSON.parse(localStorage.getItem('h') || '[]');
            const container = document.getElementById('history');
            if(!h.length) { container.innerHTML = ''; return; }
            container.innerHTML = h.map(i => `<span class="history-item" onclick="doSearch(1, '${i}')">${i}</span>`).join('') 
                + `<span class="text-muted x-small ms-3 cursor-pointer" onclick="localStorage.removeItem('h');loadHistory()">${i18n[lang].clear}</span>`;
        }
    </script>
</body>
</html>
